name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Windows executables
        run: npm run package:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cuigengji-windows-exe
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG_NAME --title $env:TAG_NAME --notes "催更姬 Windows 版本。普通用户优先下载 portable 免安装版，双击 exe 即可启动。"
          }
          $assets = Get-ChildItem -Path dist -File | Where-Object { $_.Extension -in '.exe', '.blockmap', '.yml' }
          if (-not $assets) {
            throw "No release assets found in dist."
          }
          gh release upload $env:TAG_NAME @($assets.FullName) --clobber
